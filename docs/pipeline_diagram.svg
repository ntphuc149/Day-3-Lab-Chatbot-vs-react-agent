<svg viewBox="0 0 900 1200" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, system-ui, sans-serif">

  <!-- Background -->
  <rect width="900" height="1200" fill="#f3f4f6"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Pipeline Diagram — Admission ReAct Agent</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- LAYER 1: USER -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="30" y="55" width="840" height="110" rx="12" fill="#dbeafe" stroke="#1a56db" stroke-width="2"/>
  <text x="50" y="78" font-size="13" font-weight="700" fill="#1a56db">👤  USER — web/index.html</text>

  <!-- Chat UI box -->
  <rect x="50" y="88" width="790" height="65" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="70" y="108" font-size="12" fill="#1e40af">Chat UI</text>
  <text x="70" y="126" font-size="11" fill="#374151">• Nhập natural query: "27.3đ khối A01, Bách Khoa và Bưu chính Viễn thông..."</text>
  <text x="70" y="143" font-size="11" fill="#374151">• Context pills: 📊 điểm   📚 tổ hợp   🏫 trường      • Typing indicator + bubble messages</text>

  <!-- Arrow down -->
  <line x1="450" y1="165" x2="450" y2="188" stroke="#6b7280" stroke-width="2" marker-end="url(#arr)"/>
  <text x="460" y="180" font-size="10" fill="#6b7280">POST /api/chat  { session_id, message }</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- LAYER 2: FLASK BACKEND -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="30" y="190" width="840" height="120" rx="12" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
  <text x="50" y="212" font-size="13" font-weight="700" fill="#92400e">🌐  FLASK BACKEND — web/app.py</text>

  <!-- session store pill -->
  <rect x="50" y="220" width="310" height="36" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="65" y="234" font-size="11" fill="#78350f">_sessions{ session_id → { context{}, history[] } }</text>
  <text x="65" y="249" font-size="11" fill="#78350f">In-memory session store (reset on reload)</text>

  <!-- endpoints -->
  <rect x="380" y="220" width="465" height="78" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="395" y="236" font-size="11" fill="#78350f">POST /api/chat           → agent.chat(message, session)</text>
  <text x="395" y="252" font-size="11" fill="#78350f">POST /api/session/new    → tạo session mới</text>
  <text x="395" y="268" font-size="11" fill="#78350f">POST /api/session/&lt;id&gt;/reset  → reset context</text>
  <text x="395" y="284" font-size="11" fill="#78350f">GET  /api/schools  /api/to_hop  → dữ liệu dropdown</text>

  <!-- Arrow down -->
  <line x1="450" y1="310" x2="450" y2="333" stroke="#6b7280" stroke-width="2" marker-end="url(#arr)"/>
  <text x="460" y="325" font-size="10" fill="#6b7280">agent.chat(message, session)</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- LAYER 3: ADMISSION AGENT -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="30" y="335" width="840" height="310" rx="12" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="50" y="357" font-size="13" font-weight="700" fill="#15803d">🤖  ADMISSION REACT AGENT — src/agent/admission_agent.py</text>

  <!-- Step boxes -->
  <!-- Step 1 -->
  <rect x="50" y="365" width="185" height="50" rx="7" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="142" y="385" text-anchor="middle" font-size="11" font-weight="700" fill="#166534">① _is_in_scope()</text>
  <text x="142" y="401" text-anchor="middle" font-size="10" fill="#166534">LLM → YES / NO</text>

  <!-- NO branch -->
  <line x1="235" y1="390" x2="280" y2="390" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrRed)"/>
  <text x="240" y="383" font-size="9" fill="#ef4444">NO</text>
  <rect x="282" y="373" width="190" height="34" rx="6" fill="#fee2e2" stroke="#ef4444" stroke-width="1.2"/>
  <text x="377" y="386" text-anchor="middle" font-size="10" fill="#991b1b">"Tôi chỉ hỗ trợ</text>
  <text x="377" y="400" text-anchor="middle" font-size="10" fill="#991b1b">tư vấn tuyển sinh"</text>

  <!-- YES arrow down -->
  <line x1="142" y1="415" x2="142" y2="438" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrGreen)"/>
  <text x="150" y="431" font-size="9" fill="#16a34a">YES</text>

  <!-- Step 2 -->
  <rect x="50" y="440" width="185" height="50" rx="7" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="142" y="460" text-anchor="middle" font-size="11" font-weight="700" fill="#166534">② _parse_user_intent()</text>
  <text x="142" y="476" text-anchor="middle" font-size="10" fill="#166534">LLM extract → JSON</text>

  <!-- parse result -->
  <rect x="248" y="440" width="205" height="50" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1.2"/>
  <text x="350" y="457" text-anchor="middle" font-size="10" fill="#166534">{ diem_thi, to_hop,</text>
  <text x="350" y="472" text-anchor="middle" font-size="10" fill="#166534">  truong_quan_tam, nganh_quan_tam }</text>
  <line x1="235" y1="465" x2="248" y2="465" stroke="#22c55e" stroke-width="1.2" marker-end="url(#arrGreen)"/>

  <!-- Arrow down -->
  <line x1="142" y1="490" x2="142" y2="513" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrGreen)"/>

  <!-- Step 3 -->
  <rect x="50" y="515" width="185" height="40" rx="7" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="142" y="531" text-anchor="middle" font-size="11" font-weight="700" fill="#166534">③ _merge_context()</text>
  <text x="142" y="547" text-anchor="middle" font-size="10" fill="#166534">tích lũy vào session</text>

  <!-- Arrow down -->
  <line x1="142" y1="555" x2="142" y2="578" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrGreen)"/>

  <!-- Step 4 -->
  <rect x="50" y="580" width="185" height="40" rx="7" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="142" y="596" text-anchor="middle" font-size="11" font-weight="700" fill="#166534">④ _check_missing()</text>
  <text x="142" y="612" text-anchor="middle" font-size="10" fill="#166534">diem_thi + to_hop</text>

  <!-- missing branch -->
  <line x1="235" y1="600" x2="280" y2="600" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrOrange)"/>
  <text x="240" y="593" font-size="9" fill="#f59e0b">thiếu</text>
  <rect x="282" y="584" width="175" height="34" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="369" y="597" text-anchor="middle" font-size="10" fill="#92400e">_ask_for_missing()</text>
  <text x="369" y="611" text-anchor="middle" font-size="10" fill="#92400e">→ hỏi lại user</text>

  <!-- Arrow down -->
  <line x1="142" y1="620" x2="142" y2="618" stroke="#16a34a" stroke-width="1.5"/>
  <line x1="142" y1="620" x2="142" y2="635" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrGreen)"/>
  <text x="150" y="631" font-size="9" fill="#16a34a">đủ</text>

  <!-- Step 5 -->
  <rect x="50" y="637" width="185" height="40" rx="7" fill="#bbf7d0" stroke="#16a34a" stroke-width="2"/>
  <text x="142" y="653" text-anchor="middle" font-size="11" font-weight="700" fill="#14532d">⑤ _run_react()</text>
  <text x="142" y="669" text-anchor="middle" font-size="10" fill="#14532d">ReAct loop (max 6 steps)</text>

  <!-- has truong branch -->
  <line x1="235" y1="657" x2="280" y2="657" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrGreen)"/>

  <rect x="282" y="637" width="560" height="55" rx="7" fill="#dcfce7" stroke="#22c55e" stroke-width="1.2"/>
  <text x="295" y="655" font-size="10" font-weight="600" fill="#166534">Có trường →</text>
  <text x="380" y="655" font-size="10" fill="#166534">filter_programs_by_schools(to_hop, diem_thi, truong[])</text>
  <text x="295" y="675" font-size="10" font-weight="600" fill="#166534">Không trường →</text>
  <text x="390" y="675" font-size="10" fill="#166534">suggest_top_programs(to_hop, diem_thi, nganh[])</text>

  <!-- ReAct loop label -->
  <rect x="470" y="595" width="380" height="34" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="660" y="608" text-anchor="middle" font-size="10" fill="#166534">Thought → Action: tool(args)</text>
  <text x="660" y="622" text-anchor="middle" font-size="10" fill="#166534">→ Observation → ... → Final Answer</text>

  <!-- Arrow down from agent -->
  <line x1="450" y1="645" x2="450" y2="648" stroke="#6b7280" stroke-width="2"/>
  <line x1="450" y1="692" x2="450" y2="715" stroke="#6b7280" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- LAYER 4: TOOLS -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="30" y="718" width="840" height="185" rx="12" fill="#fdf4ff" stroke="#9333ea" stroke-width="2"/>
  <text x="50" y="740" font-size="13" font-weight="700" fill="#7e22ce">🔧  TOOLS — src/tools/admission_tools.py</text>

  <!-- Tool 1 -->
  <rect x="48" y="750" width="185" height="55" rx="7" fill="#f3e8ff" stroke="#c084fc" stroke-width="1.5"/>
  <text x="140" y="767" text-anchor="middle" font-size="10" font-weight="700" fill="#6b21a8">get_subject_combination</text>
  <text x="140" y="781" text-anchor="middle" font-size="9" fill="#6b21a8">(ma_to_hop)</text>
  <text x="140" y="796" text-anchor="middle" font-size="9" fill="#6b21a8">→ to_hop_mon.json</text>

  <!-- Tool 2 -->
  <rect x="248" y="750" width="185" height="55" rx="7" fill="#f3e8ff" stroke="#c084fc" stroke-width="1.5"/>
  <text x="340" y="767" text-anchor="middle" font-size="10" font-weight="700" fill="#6b21a8">search_eligible_programs</text>
  <text x="340" y="781" text-anchor="middle" font-size="9" fill="#6b21a8">(to_hop, diem_thi)</text>
  <text x="340" y="796" text-anchor="middle" font-size="9" fill="#6b21a8">→ tất cả ngành đủ điểm</text>

  <!-- Tool 3 -->
  <rect x="448" y="750" width="185" height="55" rx="7" fill="#f3e8ff" stroke="#c084fc" stroke-width="1.5"/>
  <text x="540" y="767" text-anchor="middle" font-size="10" font-weight="700" fill="#6b21a8">filter_programs_by_schools</text>
  <text x="540" y="781" text-anchor="middle" font-size="9" fill="#6b21a8">(to_hop, diem_thi, truong[])</text>
  <text x="540" y="796" text-anchor="middle" font-size="9" fill="#6b21a8">→ lọc theo trường chọn</text>

  <!-- Tool 4 -->
  <rect x="648" y="750" width="200" height="55" rx="7" fill="#ede9fe" stroke="#a78bfa" stroke-width="2"/>
  <text x="748" y="767" text-anchor="middle" font-size="10" font-weight="700" fill="#4c1d95">suggest_top_programs</text>
  <text x="748" y="781" text-anchor="middle" font-size="9" fill="#4c1d95">(to_hop, diem_thi, nganh[])</text>
  <text x="748" y="796" text-anchor="middle" font-size="9" fill="#4c1d95">→ top 5 safety score</text>

  <!-- Data files -->
  <rect x="48" y="820" width="800" height="70" rx="7" fill="#f5f3ff" stroke="#ddd6fe" stroke-width="1.2"/>
  <text x="448" y="840" text-anchor="middle" font-size="11" font-weight="700" fill="#5b21b6">📁 Data Files</text>
  <text x="220" y="862" text-anchor="middle" font-size="11" fill="#5b21b6">data/diem_chuan.json</text>
  <text x="220" y="878" text-anchor="middle" font-size="10" fill="#7c3aed">Điểm chuẩn 2024 · 20 trường · THPT/DGTD/DGNL</text>
  <text x="620" y="862" text-anchor="middle" font-size="11" fill="#5b21b6">data/to_hop_mon.json</text>
  <text x="620" y="878" text-anchor="middle" font-size="10" fill="#7c3aed">12 tổ hợp · A00 A01 B00 C00 D01 ...</text>

  <!-- Arrow down -->
  <line x1="450" y1="903" x2="450" y2="926" stroke="#6b7280" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- LAYER 5: LLM PROVIDER -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="30" y="928" width="510" height="120" rx="12" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="50" y="950" font-size="13" font-weight="700" fill="#c2410c">🧠  LLM PROVIDER — src/core/</text>

  <rect x="50" y="960" width="140" height="40" rx="6" fill="#ffedd5" stroke="#fb923c" stroke-width="1.5"/>
  <text x="120" y="977" text-anchor="middle" font-size="10" font-weight="700" fill="#9a3412">OpenAIProvider</text>
  <text x="120" y="992" text-anchor="middle" font-size="9" fill="#9a3412">GPT-4o (default)</text>

  <rect x="205" y="960" width="140" height="40" rx="6" fill="#ffedd5" stroke="#fb923c" stroke-width="1.5"/>
  <text x="275" y="977" text-anchor="middle" font-size="10" font-weight="700" fill="#9a3412">GeminiProvider</text>
  <text x="275" y="992" text-anchor="middle" font-size="9" fill="#9a3412">gemini-1.5-flash</text>

  <rect x="360" y="960" width="160" height="40" rx="6" fill="#ffedd5" stroke="#fb923c" stroke-width="1.5"/>
  <text x="440" y="977" text-anchor="middle" font-size="10" font-weight="700" fill="#9a3412">LocalProvider</text>
  <text x="440" y="992" text-anchor="middle" font-size="9" fill="#9a3412">Phi-3-mini GGUF (CPU)</text>

  <text x="285" y="1040" text-anchor="middle" font-size="10" fill="#9a3412">LLMProvider (abstract base) — generate() / stream()</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- LAYER 6: TELEMETRY -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="555" y="928" width="315" height="120" rx="12" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="575" y="950" font-size="13" font-weight="700" fill="#0369a1">📊  TELEMETRY — src/telemetry/</text>

  <rect x="570" y="960" width="135" height="75" rx="6" fill="#e0f2fe" stroke="#38bdf8" stroke-width="1.2"/>
  <text x="637" y="977" text-anchor="middle" font-size="10" font-weight="700" fill="#075985">IndustryLogger</text>
  <text x="637" y="991" text-anchor="middle" font-size="9" fill="#075985">trace_*.log (plain)</text>
  <text x="637" y="1005" text-anchor="middle" font-size="9" fill="#075985">trace_*.jsonl (JSON)</text>
  <text x="637" y="1019" text-anchor="middle" font-size="9" fill="#075985">Console màu</text>
  <text x="637" y="1033" text-anchor="middle" font-size="9" fill="#075985">per-session files</text>

  <rect x="720" y="960" width="135" height="75" rx="6" fill="#e0f2fe" stroke="#38bdf8" stroke-width="1.2"/>
  <text x="787" y="977" text-anchor="middle" font-size="10" font-weight="700" fill="#075985">PerformanceTracker</text>
  <text x="787" y="991" text-anchor="middle" font-size="9" fill="#075985">tokens (p/c/total)</text>
  <text x="787" y="1005" text-anchor="middle" font-size="9" fill="#075985">latency_ms</text>
  <text x="787" y="1019" text-anchor="middle" font-size="9" fill="#075985">cost_estimate</text>
  <text x="787" y="1033" text-anchor="middle" font-size="9" fill="#075985">provider / model</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- EVENTS row -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="30" y="1060" width="840" height="50" rx="10" fill="#1e293b"/>
  <text x="450" y="1079" text-anchor="middle" font-size="10" font-weight="700" fill="#94a3b8">Log Events</text>
  <text x="450" y="1097" text-anchor="middle" font-size="9.5" fill="#64748b">AGENT_START · AGENT_STEP · THOUGHT · TOOL_CALL · PARSE_ERROR · JSON_ERROR · TOOL_NOT_FOUND · TOOL_ERROR · OUT_OF_SCOPE · INTENT_PARSED · INFO_INCOMPLETE · AGENT_END</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- LEGEND -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="30" y="1120" width="840" height="62" rx="10" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="50" y="1140" font-size="11" font-weight="700" fill="#374151">Legend</text>
  <rect x="50" y="1148" width="14" height="14" rx="3" fill="#dbeafe" stroke="#1a56db" stroke-width="1.5"/>
  <text x="70" y="1160" font-size="10" fill="#374151">Frontend</text>
  <rect x="145" y="1148" width="14" height="14" rx="3" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="165" y="1160" font-size="10" fill="#374151">Backend</text>
  <rect x="240" y="1148" width="14" height="14" rx="3" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="260" y="1160" font-size="10" fill="#374151">Agent Logic</text>
  <rect x="355" y="1148" width="14" height="14" rx="3" fill="#fdf4ff" stroke="#9333ea" stroke-width="1.5"/>
  <text x="375" y="1160" font-size="10" fill="#374151">Tools + Data</text>
  <rect x="465" y="1148" width="14" height="14" rx="3" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5"/>
  <text x="485" y="1160" font-size="10" fill="#374151">LLM Provider</text>
  <rect x="575" y="1148" width="14" height="14" rx="3" fill="#f0f9ff" stroke="#0284c7" stroke-width="1.5"/>
  <text x="595" y="1160" font-size="10" fill="#374151">Telemetry</text>
  <rect x="665" y="1148" width="14" height="14" rx="3" fill="#ede9fe" stroke="#a78bfa" stroke-width="2"/>
  <text x="685" y="1160" font-size="10" fill="#374151">New in Agent v2</text>

  <!-- Arrowhead markers -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6b7280"/>
    </marker>
    <marker id="arrGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#16a34a"/>
    </marker>
    <marker id="arrRed" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ef4444"/>
    </marker>
    <marker id="arrOrange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f59e0b"/>
    </marker>
  </defs>

</svg>
